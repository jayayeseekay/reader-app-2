          const wordPos_ = lqData.wordPos?.[effectiveLang] || {};
          const POS_ORDER = ['noun', 'verb', 'adjective', 'adverb', 'pronoun', 'preposition', 'conjunction', 'article', 'other', 'unknown'];
          let modalBody;
          if (isKnownModal) {
            const groups = {};
            for (const [w] of entries) {
              const pos = wordPos_[w] || 'unknown';
              if (!groups[pos]) groups[pos] = [];
              groups[pos].push(w);
            }
            const sortedGroups = POS_ORDER.filter(p => groups[p])
              .concat(Object.keys(groups).filter(p => !POS_ORDER.includes(p)));
            modalBody = entries.length === 0
              ? <p style={{color:'var(--text-muted)',fontSize:'14px',marginTop:'12px'}}>No words yet.</p>
              : (
                <div style={{maxHeight:'460px',overflowY:'auto',paddingTop:'4px'}}>
                  {sortedGroups.map(pos => (
                    <div key={pos} className="lq-pos-group">
                      <div className="lq-pos-toggle" onClick={() => setPosOpen(o => ({...o, [pos]: !o[pos]}))}>
                        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                          <span className={`lq-pos-chevron${posOpen[pos] ? ' open' : ''}`}>▶</span>
                          <span className="lq-pos-label">{pos}</span>
                        </div>
                        <span className="lq-pos-count">{groups[pos].length}</span>
                      </div>
                      {posOpen[pos] && (
                        <div className="lq-pos-body">
                          {groups[pos].map(w => (
                            <div key={w} className="lq-word-list-item"><span>{w}</span></div>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              );
          } else {
            modalBody = entries.length === 0
              ? <p style={{color:'var(--text-muted)',fontSize:'14px',marginTop:'12px'}}>No words yet.</p>
              : (
                <div className="lq-word-list" style={{maxHeight:'380px',overflowY:'auto'}}>
                  {entries.map(([w, s]) => (
                    <div key={w} className="lq-word-list-item">
                      <span>{w}</span>
                      <span className="lq-wl-stage" data-s={s}>S{s}</span>
                    </div>
                  ))}
                </div>
              );
          }
          return (
            <div className="modal-overlay" onClick={() => setStatsModal(null)}>
              <div className="modal" style={{maxWidth:500}} onClick={e => e.stopPropagation()}>
                <div className="modal-title">{isKnownModal ? '✓ Known Words' : '◐ Learning Words'} — {entries.length}</div>
                {modalBody}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'20px'}}>
                  {!isKnownModal && entries.length > 0 ? (
                    <button className="btn btn-primary" onClick={() => {
                      const cards = buildStudyCards(effectiveLang);
                      if (cards.length === 0) return;
                      setStudyCards(cards);
                      setStudyIdx(0);
                      setStudyMode(null);
                      setStudyFlipped(false);
                      setStudyAnswer(null);
                      setStudyScore({ correct: 0, total: 0 });
                      studyFetchRef.current = null;
                      setStatsModal(null);
                      setView('study');
                    }}>Study ▶</button>
                  ) : <span />}
                  <button className="btn btn-ghost" onClick={() => setStatsModal(null)}>Close</button>
                </div>
              </div>
            </div>
          );
        })()}

        {showImport && (
          <div className="modal-overlay" onClick={() => { if (!translating) setShowImport(false); }}>
            <div className="modal" style={{maxWidth:520}} onClick={e => e.stopPropagation()}>
              <div className="modal-title">Import</div>
              <div className="lq-import-form">
                <div style={{background:'var(--bg-tertiary)',borderRadius:'8px',padding:'12px 14px'}}>
                  <label style={{fontSize:'12px',color:'var(--text-muted)',display:'block',marginBottom:'6px'}}>Import from URL <span style={{color:'var(--text-muted)',fontWeight:400}}>(YouTube or web article)</span></label>
                  <div style={{display:'flex',gap:'8px'}}>
                    <input className="input" value={importUrl} onChange={e => setImportUrl(e.target.value)} placeholder="https://youtube.com/watch?v=… or any article URL" style={{flex:1}} disabled={translating || urlFetching} onKeyDown={e => { if (e.key === 'Enter' && importUrl.trim()) fetchFromUrl(); }} />
                    <button className="btn btn-primary" onClick={fetchFromUrl} disabled={!importUrl.trim() || translating || urlFetching} style={{whiteSpace:'nowrap'}}>
                      {urlFetching ? 'Fetching…' : 'Fetch'}
                    </button>
                  </div>
                  {urlError && <div style={{fontSize:'12px',color:'#ef4444',marginTop:'6px'}}>{urlError}</div>}
                </div>
                <div style={{background:'var(--bg-tertiary)',borderRadius:'8px',padding:'12px 14px'}}>
                  <label style={{fontSize:'12px',color:'var(--text-muted)',display:'block',marginBottom:'6px'}}>Upload audio <span style={{color:'var(--text-muted)',fontWeight:400}}>(mp3 or wav — transcribed via Whisper)</span></label>
                  <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                    <input type="file" accept=".mp3,.wav,audio/mpeg,audio/wav" onChange={e => { if (e.target.files[0]) uploadAudio(e.target.files[0]); e.target.value=''; }} disabled={audioUploading || translating} style={{fontSize:'13px',color:'var(--text-secondary)',flex:1}} />
                  </div>
                  {audioUploadStatus && <div style={{fontSize:'12px',color:'var(--accent)',marginTop:'6px'}}>{audioUploadStatus}</div>}
                </div>
                <div style={{textAlign:'center',fontSize:'12px',color:'var(--text-muted)',padding:'2px 0'}}>— or paste text manually —</div>
                <div>
                  <label style={{fontSize:'12px',color:'var(--text-muted)',display:'block',marginBottom:'6px'}}>Title</label>
                  <input className="input" value={importTitle} onChange={e => setImportTitle(e.target.value)} placeholder="e.g. Le Petit Prince – Chapter 1" style={{width:'100%'}} disabled={translating} />
                </div>
                <div>
                  <label style={{fontSize:'12px',color:'var(--text-muted)',display:'block',marginBottom:'6px'}}>Language</label>
                  <select className="lq-lang-select" value={importLang} onChange={e => setImportLang(e.target.value)} disabled={translating}>
                    {SOURCE_LANGS.map(l => <option key={l.code} value={l.code}>{l.label}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:'12px',color:'var(--text-muted)',display:'block',marginBottom:'6px'}}>Paste your text</label>
                  <textarea className="lq-import-textarea" value={importContent} onChange={e => setImportContent(e.target.value)} placeholder="Paste any text in your target language here…" disabled={translating} />
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',background:'var(--bg-tertiary)',borderRadius:'8px',gap:'12px'}}>
                  <div>
                    <div style={{fontSize:'13px',fontWeight:600,marginBottom:'3px'}}>Auto-translate</div>
                    <div style={{fontSize:'12px',color:'var(--text-muted)'}}>
                      {importTargets.length > 0
                        ? 'Will also create: ' + importTargets.map(c => LANG_OPTIONS.find(l => l.code === c)?.label).join(' · ')
                        : importLang === 'en' ? 'Select a language above' : 'Nothing to translate'
                      }
                    </div>
                  </div>
                  <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',flexShrink:0}}>
                    <input type="checkbox" checked={autoTranslate} onChange={e => setAutoTranslate(e.target.checked)} disabled={translating} style={{width:16,height:16,cursor:'pointer'}} />
                    <span style={{fontSize:'13px',color:'var(--text-secondary)'}}>On</span>
                  </label>
                </div>
                {translating && (
                  <div style={{textAlign:'center',padding:'10px',color:'var(--accent)',fontSize:'13px',fontWeight:500}}>
                    Translating… this may take a moment
                  </div>
                )}
                <div className="modal-actions">
                  <button className="btn btn-ghost" onClick={() => setShowImport(false)} disabled={translating}>Cancel</button>
                  <button className="btn btn-primary" onClick={addText} disabled={!importTitle.trim() || !importContent.trim() || translating}>
                    {translating ? 'Importing…' : 'Import'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        <div className="lq-story-gen">
            <div className="lq-story-gen-header">
              <div className="lq-story-gen-title">Story Generator</div>
              <div className="lq-story-gen-desc">Generate a story{learningCount > 0 ? ' using your learning words' : ' at your level'}</div>
            </div>
            <div className="lq-story-gen-controls" style={{flexDirection:'column',alignItems:'stretch'}}>
              {learningCount > 0 && (
              <div className="lq-story-gen-slider-row">
                <label className="lq-story-gen-label">Words to include: {Math.round(learningCount * storyPct / 100)} of {learningCount} ({storyPct}%){storyPct === 0 ? ' — general story, no vocab' : ''}</label>
                <input type="range" min="0" max="100" step="5" value={storyPct} onChange={e => setStoryPct(parseInt(e.target.value))} className="lq-story-slider" />
              </div>
              )}
              <div className="lq-story-gen-slider-row">
                <label className="lq-story-gen-label">Story length: {['Short (50–100 words)','Medium (150–250 words)','Long (300–500 words)'][storyLength]}</label>
                <input type="range" min="0" max="2" step="1" value={storyLength} onChange={e => setStoryLength(parseInt(e.target.value))} className="lq-story-slider" />
              </div>
              <div className="lq-story-gen-slider-row">
                <label className="lq-story-gen-label">CEFR Level: {['A1 — Beginner','A2 — Elementary','B1 — Intermediate','B2 — Upper Intermediate','C1 — Advanced','C2 — Proficient'][storyCEFR]}</label>
                <input type="range" min="0" max="5" step="1" value={storyCEFR} onChange={e => setStoryCEFR(parseInt(e.target.value))} className="lq-story-slider" />
              </div>
              <button className="lq-story-gen-btn" onClick={generateStory} disabled={storyGenerating} style={{alignSelf:'flex-start'}}>
                {storyGenerating ? 'Generating…' : 'Generate Story'}
              </button>
            </div>
            {storyGenerating && storyStatus && (
              <div className="lq-story-gen-status">
                <span className="lq-story-gen-spinner"></span>
                <span>{storyStatus}</span>
                <span className="lq-story-gen-timer">{storyElapsed}s</span>
              </div>
            )}
            {storyError && <div className="lq-story-gen-error">{storyError}</div>}
          </div>

        <div className="lq-library-tabs">
          <button className={'lq-library-tab' + (libraryTab === 'imported' ? ' lq-library-tab-active' : '')} onClick={() => setLibraryTab('imported')}>
            Imported ({filteredTexts.filter(t => !t.generated).length})
          </button>
          <button className={'lq-library-tab' + (libraryTab === 'generated' ? ' lq-library-tab-active' : '')} onClick={() => setLibraryTab('generated')}>
            Generated ({filteredTexts.filter(t => t.generated).length})
          </button>
        </div>

        {(() => {
          const tabTexts = filteredTexts.filter(t => libraryTab === 'generated' ? t.generated : !t.generated);
          return tabTexts.length === 0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">{I.reader}</div>
            <div className="empty-state-title">{libraryTab === 'generated' ? 'No generated stories yet' : 'No texts yet'}</div>
            <div className="empty-state-body">{libraryTab === 'generated' ? 'Use the Story Generator above to create stories from your learning words.' : 'Import any text — an article, book chapter, song lyrics — and start reading word by word to build your vocabulary.'}</div>
            {libraryTab === 'imported' && <button className="lq-import-btn" style={{margin:'0 auto'}} onClick={() => setShowImport(true)}>{I.plus} Import</button>}
          </div>
        ) : (
          <div className="lq-library">
            {tabTexts.map(text => {
              const lang = LANG_OPTIONS.find(l => l.code === text.language) || LANG_OPTIONS[0];
              const wordCount = tokenizeText(text.content).filter(t => t.type === 'word').length;
              return (
                <div key={text.id} className="lq-text-card" onClick={() => { setActiveTextId(text.id); setReaderPage(0); setView('reader'); }}>
                  <div className="lq-text-card-header">
                    <div className="lq-text-card-title">{text.title}</div>
                    <div className="lq-text-card-lang">{lang.label}</div>
                  </div>
                  <div className="lq-text-card-preview">{text.content.slice(0, 150)}{text.content.length > 150 ? '…' : ''}</div>
                  <div className="lq-text-card-footer">
                    <span className="lq-text-card-wordcount">{wordCount.toLocaleString()} words</span>
                    <span className="lq-text-card-time">{timeAgo(text.addedAt)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        );
        })()}
      </div>
    );
  }

  // ── READER VIEW ──────────────────────────────────────────────

  if (view === 'reader' && activeText) {
    const lang      = LANG_OPTIONS.find(l => l.code === activeText.language) || LANG_OPTIONS[0];
    const ytId      = extractYouTubeId(activeText.sourceUrl);
    const audioFile = activeText.sourceUrl && activeText.sourceUrl.startsWith('audio:') ? activeText.sourceUrl.slice(6) : null;
    const hasMedia  = !!(ytId || audioFile);
    if (!bgTranslateRef.current || bgTranslateRef.current.textId !== activeText.id) {
      const ctx = { cancelled: false, textId: activeText.id };
      if (bgTranslateRef.current) bgTranslateRef.current.cancelled = true;
      bgTranslateRef.current = ctx;
      const langOpt = lang;
      const tokens_ = tokenizeText(activeText.content);
      const unique_ = [...new Set(tokens_.filter(t => t.type === 'word').map(t => t.key))];
      (async () => {
        for (const word of unique_) {
          if (ctx.cancelled) return;
          const f = lqDataRef.current;
          const wt = f.wordTranslations?.[langOpt.code] || {};
          if (wt[word] && !isBadTranslation(wt[word])) continue;
          const tr = await fetchTranslation(word, langOpt.apiCode);
          if (ctx.cancelled) return;
          if (tr && tr !== '(unavailable)') {
            const f2 = lqDataRef.current;
            const wtU = { ...(f2.wordTranslations || {}), [langOpt.code]: { ...(f2.wordTranslations?.[langOpt.code] || {}), [word]: tr } };
            saveLqData({ ...f2, wordTranslations: wtU });
          }
          await new Promise(r => setTimeout(r, 120));
        }
      })();
    }
    const allTokens = tokenizeText(activeText.content);
    const pages     = paginateTokens(allTokens);
    const safePage  = Math.min(readerPage, pages.length - 1);
    const pageTokens = pages[safePage] || [];
    const readerWS  = wordStatus[lang.code] || {};
    const isLast    = safePage === pages.length - 1;

    // Build phrase highlight map: token index → { key, status, from, to } for learning phrases
    const phraseHighlight = {};
    phraseHighlightRef.current = phraseHighlight;
    const learningPhrases = Object.entries(readerWS)
      .filter(([k, s]) => k.includes(' ') && s >= 1 && s <= 4);
    if (learningPhrases.length > 0) {
      const wordIndices = [];
      for (let ti = 0; ti < pageTokens.length; ti++) {
        if (pageTokens[ti].type === 'word') wordIndices.push(ti);
      }
      for (const [phraseKey, phraseStatus] of learningPhrases) {
        const phraseWords = phraseKey.split(/\s+/);
        for (let wi = 0; wi <= wordIndices.length - phraseWords.length; wi++) {
          let match = true;
          for (let pw = 0; pw < phraseWords.length; pw++) {
            if (pageTokens[wordIndices[wi + pw]].key !== phraseWords[pw]) { match = false; break; }
          }
          if (match) {
            const from = wordIndices[wi];
            const to = wordIndices[wi + phraseWords.length - 1];
            for (let ti = from; ti <= to; ti++) {
              if (!phraseHighlight[ti] || phraseStatus < phraseHighlight[ti].status) {
                phraseHighlight[ti] = { key: phraseKey, status: phraseStatus, from, to };
              }
            }
          }
        }
      }
    }

    return (
      <div className={`lq-page${hasMedia ? ' lq-page-with-media' : ''}`} onPointerDown={() => setPopup(null)}>

        <div className="lq-reader-header">
          <button className="lq-back-btn" onClick={() => { setView('library'); setPopup(null); setReaderPage(0); touchSelRef.current = null; setTouchSel(null); }}>← Library</button>
          <div className="lq-reader-title">{activeText.title}</div>
          <div className="lq-reader-lang-badge">{lang.label}</div>
          {ytId && (
            <button className="lq-yt-toggle" onClick={() => setVideoHidden(h => !h)} title={videoHidden ? 'Show video (audio is still playing)' : 'Hide video (audio keeps playing)'}>
              {videoHidden ? 'Show video' : 'Hide video'}
            </button>
          )}
          {audioFile && (
            <button className="lq-yt-toggle" onClick={() => setAudioHidden(h => !h)} title={audioHidden ? 'Show audio player' : 'Hide audio player'}>
              {audioHidden ? 'Show audio' : 'Hide audio'}
            </button>
          )}
          <button className="lq-delete-btn" onClick={() => { if (window.confirm('Delete this text?')) deleteText(activeText.id); }}>Delete</button>
        </div>

        <div className="lq-reader-body"
          onPointerMove={handleReaderPointerMove}
          onPointerUp={e => handleReaderPointerUp(e, pageTokens, lang)}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={e => handleTouchEnd(e, pageTokens, lang)}
        >
          {pageTokens.map((token, i) => {
            const ph = phraseHighlight[i];
            const isDragSel  = dragSel !== null && i >= Math.min(dragSel.start, dragSel.end) && i <= Math.max(dragSel.start, dragSel.end);
            const isTouchSel = touchSel !== null && i >= Math.min(touchSel.start, touchSel.end) && i <= Math.max(touchSel.start, touchSel.end);
            const isSel = isDragSel || isTouchSel;

            if (token.type === 'punct') {
              // Punctuation inside a phrase range gets highlighted as part of the phrase
              if (ph) {
                const isFirst = i === ph.from;
                const isLast  = i === ph.to;
                return (
                  <span key={i} data-widx={i}
                    className={`lq-word-phrase-span${isFirst ? ' lq-phrase-first' : ''}${isLast ? ' lq-phrase-last' : ''}${isSel ? ' lq-word-sel' : ''}`}
                    data-status={ph.status}
                    onClick={e => { e.stopPropagation(); openPhrasePopup(e.clientX, e.clientY, ph.key, pageTokens, ph.from, ph.to, lang); }}
                    onPointerDown={e => { if (e.pointerType !== 'touch') e.stopPropagation(); }}
                  >{token.raw}</span>
                );
              }
              if (token.raw.includes('\n')) {
                const parts = token.raw.split('\n');
                return parts.map((part, j) => (
                  <React.Fragment key={`${i}-${j}`}>
                    {part}{j < parts.length - 1 && <br />}
                  </React.Fragment>
                ));
              }
              return <span key={i}>{token.raw}</span>;
            }
            const wordSt = readerWS[token.key] ?? 0;
            // Show phrase learning highlight if word is part of a learning phrase
            const displaySt = (ph && (wordSt === 5 || wordSt === -1 || wordSt === 0)) ? ph.status : wordSt;
            const isFirst = ph && i === ph.from;
            const isLast  = ph && i === ph.to;
            return (
              <span
                key={i}
                data-widx={i}
                className={`lq-word${isSel ? ' lq-word-sel' : ''}${ph ? ` lq-word-phrase-span${isFirst ? ' lq-phrase-first' : ''}${isLast ? ' lq-phrase-last' : ''}` : ''}`}
                data-status={displaySt === 5 || displaySt === -1 ? undefined : displaySt}
                onPointerDown={e => {
                  if (ph && e.pointerType !== 'touch') {
                    // Clicking a phrase-highlighted word opens the phrase popup
                    e.preventDefault();
                    e.stopPropagation();
                    openPhrasePopup(e.clientX, e.clientY, ph.key, pageTokens, ph.from, ph.to, lang);
                    return;
                  }
                  handleWordPointerDown(e, i);
                }}
              >{token.raw}</span>
            );
          })}
        </div>

        {touchSel && (
          <div className="lq-sel-bar" onTouchStart={e => e.stopPropagation()}>
            <button className="lq-sel-arrow" onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); expandSelLeft(pageTokens); }} onClick={() => expandSelLeft(pageTokens)}>
              ← add
            </button>
            <button className="lq-sel-arrow lq-sel-arrow-shrink" onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); shrinkSelRight(pageTokens); }} onClick={() => shrinkSelRight(pageTokens)} disabled={touchSel && Math.min(touchSel.start, touchSel.end) === Math.max(touchSel.start, touchSel.end)}>
              remove →
            </button>
            <button className="lq-sel-translate-btn" onPointerDown={e => e.stopPropagation()} onTouchStart={e => e.stopPropagation()} onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); translateTouchSel(pageTokens, lang); }}>
              Translate
            </button>
            <button className="lq-sel-arrow lq-sel-arrow-shrink" onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); shrinkSelLeft(pageTokens); }} onClick={() => shrinkSelLeft(pageTokens)} disabled={touchSel && Math.min(touchSel.start, touchSel.end) === Math.max(touchSel.start, touchSel.end)}>
              ← remove
            </button>
            <button className="lq-sel-arrow" onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); expandSelRight(pageTokens); }} onClick={() => expandSelRight(pageTokens)}>
              add →
            </button>
          </div>
        )}

        <div className="lq-reader-nav">
          <button
            className="lq-nav-btn"
            disabled={safePage === 0}
            onClick={() => { setPopup(null); setReaderPage(p => p - 1); touchSelRef.current = null; setTouchSel(null); }}
          >← Previous</button>
          <span className="lq-reader-page-info">Page {safePage + 1} of {pages.length}</span>
          <button
            className="lq-nav-btn lq-nav-next"
            onClick={() => {
              touchSelRef.current = null; setTouchSel(null);
              if (isLast) {
                advancePage(pageTokens, lang.code);
                setReaderPage(0);
                setView('library');
              } else {
                advancePage(pageTokens, lang.code);
              }
            }}
          >{isLast ? 'Finish ✓' : 'Next →'}</button>
        </div>

        {popup && (
          <div className="lq-popup" style={{top: popup.y, left: popup.x}} onClick={e => e.stopPropagation()} onPointerDown={e => e.stopPropagation()}>
            <button className="lq-popup-close" onClick={() => setPopup(null)}>×</button>
            <div className="lq-popup-word">
              {popup.word}
              <button className="lq-popup-audio-btn" title="Pronounce" onClick={() => speakInLang(popup.word, popup.langOption.speechLang)}>🔊</button>
            </div>
            <hr className="lq-popup-divider" />
            <div className={`lq-popup-translation ${popup.loading ? 'lq-loading' : ''}`}>
              {popup.loading ? 'Translating…' : popup.translation}
            </div>
            {popup.key && (
              <>
                <div className="lq-popup-section-label">Learning stage</div>
                <div className="lq-popup-stages">
                  {[1,2,3,4].map(s => (
                    <button
                      key={s}
                      className={`lq-stage-btn ${popup.status === s ? 'lq-stage-active' : ''}`}
                      data-s={s}
                      onClick={() => updateWord(popup.key, s, lang.code)}
                    >{s}</button>
                  ))}
                </div>
                <button className="lq-popup-known-btn" onClick={() => {
                  if (popup.isPhrase && popup.childKeys) {
                    // Mark phrase as known (remove from learning) and mark individual words as known if not already
                    const langWS = wordStatus[lang.code] || {};
                    const updates = { [popup.key]: 5 };
                    popup.childKeys.forEach(k => {
                      if ((langWS[k] ?? 0) !== 5) updates[k] = 5;
                    });
                    setWS(lang.code, updates);
                  } else {
                    updateWord(popup.key, 5, lang.code);
                  }
                  setPopup(null);
                }}>
                  ✓ I Know This{popup.isPhrase ? ' (+ words)' : ''}
                </button>
                {!popup.isPhrase && (
                  <button
                    className={'lq-popup-ignore-btn' + (popup.status === -1 ? ' lq-ignored' : '')}
                    onClick={() => { updateWord(popup.key, popup.status === -1 ? 0 : -1, lang.code); if (popup.status !== -1) setPopup(null); }}
                  >
                    {popup.status === -1 ? '↩ Unignore' : '✕ Ignore (not a real word)'}
                  </button>
                )}
              </>
            )}
          </div>
        )}

        {ytId && (
          <div className="lq-media-wrap" style={{display: videoHidden ? 'none' : 'block'}}>
            <iframe
              key="lq-yt-iframe"
              className="lq-yt-iframe"
              src={`https://www.youtube.com/embed/${ytId}`}
              title="YouTube video"
              frameBorder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowFullScreen
            />
          </div>
        )}
        {audioFile && (
          <div className="lq-media-wrap lq-audio-wrap" style={{display: audioHidden ? 'none' : 'block'}}>
            <audio
              key="lq-audio-player"
              className="lq-audio-player"
              controls
              src={`/api/audio/${encodeURIComponent(audioFile)}`}
              preload="metadata"
            />
          </div>
        )}

      </div>
    );
  }

  return null;
}

function App() {
  return (
    <div className="main">
      <LingQPage />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
